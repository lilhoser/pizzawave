name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Validate version
        run: |
          if [[ ! "${{ steps.get_version.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid version: ${{ steps.get_version.outputs.version }}"
            exit 1
          fi

  build-pizzawave:
    runs-on: ubuntu-latest
    needs: get-version
    strategy:
      matrix:
        include:
          - runtime: linux-x64
            artifact: pizzawave-deb-amd64
          - runtime: linux-arm64
            artifact: pizzawave-deb-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pizzad/web/package-lock.json
      - name: Build PizzaWave .deb (${{ matrix.runtime }})
        run: |
          bash ./scripts/pizzawave build-deb \
            --version "${{ needs.get-version.outputs.version }}" \
            --rid "${{ matrix.runtime }}"
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/packages/*.deb
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: [get-version, build-pizzawave]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Prepare release files
        run: |
          mkdir -p ./release
          cp ./artifacts/**/*.deb ./release/
          ls -la ./release/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          generate_release_notes: true
