name: Validate

on:
  pull_request:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pizzad/web/package-lock.json

      - name: Build web
        run: |
          npm ci --prefix pizzad/web
          npm run build --prefix pizzad/web

      - name: Test
        run: dotnet test pizzawave.sln --configuration Release

      - name: Publish linux-x64
        run: dotnet publish pizzad/pizzad.csproj --configuration Release --runtime linux-x64 --self-contained false -p:PIZZAD_SKIP_WEB_BUILD=true

      - name: Publish linux-arm64
        run: dotnet publish pizzad/pizzad.csproj --configuration Release --runtime linux-arm64 --self-contained false -p:PIZZAD_SKIP_WEB_BUILD=true

      - name: CUDA configuration compile check
        run: dotnet build pizzad/pizzad.csproj --configuration RELEASE_X64_CUDA -p:BuildProfile=Release_X64_CUDA -p:PIZZAD_SKIP_WEB_BUILD=true
